<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantCare · Tell us about your home</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  body {
    background: radial-gradient(ellipse at top, #064E3B 0%, #022C22 60%, #001A12 100%);
    background-attachment: fixed;
    color: #ECFDF5;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .font-display { font-family: 'Fraunces', serif; letter-spacing: -0.025em; }
  .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.10); }
  .glass-bar { background: rgba(2, 44, 34, 0.78); backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .glass-light { background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); }
  .shadow-soft { box-shadow: 0 12px 40px -12px rgba(0,0,0,0.35), 0 4px 12px -4px rgba(0,0,0,0.20); }
  .glow-emerald { box-shadow: 0 8px 32px -8px rgba(16,185,129,0.55); }
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="glass-bar sticky top-0 z-10">
  <div class="mx-auto max-w-3xl px-4 py-3 sm:px-6 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <svg class="h-6 w-6 text-emerald-300" fill="currentColor" viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z"/></svg>
      <span class="font-display text-lg font-semibold text-white">PlantCare</span>
    </a>
    <p class="text-xs uppercase tracking-widest text-emerald-300/70">Step 1 of 1</p>
  </div>
</header>

<main class="flex-1 mx-auto w-full max-w-2xl px-4 py-8 sm:px-6">

  <div class="mb-8">
    <p class="text-xs uppercase tracking-[0.25em] text-emerald-300/80">Hi Dipanjan</p>
    <h1 class="font-display mt-2 text-4xl font-semibold text-white sm:text-5xl">Where do your plants live?</h1>
    <p class="mt-3 text-sm text-emerald-100/70 max-w-md">We use your location for outdoor temperature and humidity. Nothing personal is shared.</p>
  </div>

  <div class="glass-light rounded-3xl p-6 shadow-soft sm:p-8 space-y-6">

    <!-- LOCATION -->
    <div>
      <p class="text-[10px] uppercase tracking-widest font-bold text-stone-500">Section 1</p>
      <h2 class="font-display mt-1 text-2xl font-semibold text-stone-900">Location</h2>
      <div class="mt-4 space-y-4">

        <button class="w-full flex items-center justify-between rounded-xl border-2 border-emerald-200 bg-emerald-50 px-4 py-3.5 text-left hover:bg-emerald-100 transition">
          <div class="flex items-center gap-3">
            <svg class="h-5 w-5 text-emerald-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <div>
              <p class="text-sm font-semibold text-emerald-900">Use my current location</p>
              <p class="text-xs text-emerald-700/70">Fastest — we'll auto-fill the rest</p>
            </div>
          </div>
          <svg class="h-4 w-4 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>

        <div class="flex items-center gap-3">
          <div class="flex-1 h-px bg-stone-200"></div>
          <span class="text-xs uppercase tracking-wider text-stone-400">or enter manually</span>
          <div class="flex-1 h-px bg-stone-200"></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[11px] uppercase tracking-wider font-bold text-stone-600">City</label>
            <input type="text" placeholder="Bangalore" class="mt-2 w-full rounded-xl border-0 bg-stone-100 px-4 py-3 text-sm text-stone-900 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-[11px] uppercase tracking-wider font-bold text-stone-600">Pincode</label>
            <input type="text" placeholder="560087" class="mt-2 w-full rounded-xl border-0 bg-stone-100 px-4 py-3 text-sm text-stone-900 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
          </div>
        </div>
      </div>
    </div>

    <div class="h-px bg-stone-200"></div>

    <!-- DEFAULT FLOOR -->
    <div>
      <p class="text-[10px] uppercase tracking-widest font-bold text-stone-500">Section 2</p>
      <h2 class="font-display mt-1 text-2xl font-semibold text-stone-900">Default floor</h2>
      <p class="mt-1 text-xs text-stone-600">Used for new plants — you can change it per plant later.</p>
      <div class="mt-4 grid grid-cols-6 gap-2">
        <button class="rounded-xl bg-stone-100 py-3 text-sm font-semibold text-stone-700 hover:bg-stone-200">G</button>
        <button class="rounded-xl bg-stone-100 py-3 text-sm font-semibold text-stone-700 hover:bg-stone-200">1</button>
        <button class="rounded-xl bg-stone-100 py-3 text-sm font-semibold text-stone-700 hover:bg-stone-200">2</button>
        <button class="rounded-xl bg-stone-100 py-3 text-sm font-semibold text-stone-700 hover:bg-stone-200">3-5</button>
        <button class="rounded-xl bg-stone-100 py-3 text-sm font-semibold text-stone-700 hover:bg-stone-200">6-10</button>
        <button class="rounded-xl bg-emerald-900 py-3 text-sm font-bold text-emerald-300 shadow-soft">11+</button>
      </div>
    </div>

  </div>

  <div class="mt-6 flex gap-3 justify-end">
    <button class="rounded-2xl px-5 py-3 text-sm font-medium text-emerald-200 hover:bg-white/5">Skip for now</button>
    <button class="rounded-2xl bg-emerald-300 px-6 py-3 text-sm font-bold text-emerald-950 glow-emerald hover:bg-emerald-200 transition">Continue →</button>
  </div>

</main>

</body>
</html>
