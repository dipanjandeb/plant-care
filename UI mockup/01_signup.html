<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantCare · Create account</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  body {
    background: radial-gradient(ellipse at top, #064E3B 0%, #022C22 60%, #001A12 100%);
    background-attachment: fixed;
    color: #ECFDF5;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .font-display { font-family: 'Fraunces', serif; letter-spacing: -0.025em; }
  .glass-light { background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); }
  .shadow-soft { box-shadow: 0 12px 40px -12px rgba(0,0,0,0.35), 0 4px 12px -4px rgba(0,0,0,0.20); }
  .shadow-lift { box-shadow: 0 28px 64px -16px rgba(0,0,0,0.55), 0 10px 24px -8px rgba(0,0,0,0.35); }
  .glow-emerald { box-shadow: 0 8px 32px -8px rgba(16,185,129,0.55); }
  .card-interactive { transition: transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 250ms ease-out; }
  .card-interactive:hover { transform: translateY(-6px); }
  .leaf-bg {
    background-image: radial-gradient(circle at 20% 30%, rgba(110,231,183,0.18) 0%, transparent 35%),
                      radial-gradient(circle at 80% 70%, rgba(190,242,100,0.13) 0%, transparent 35%);
  }
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="px-4 py-4 sm:px-6">
  <a href="index.html" class="inline-flex items-center gap-2 text-emerald-200 hover:text-white">
    <svg class="h-6 w-6 text-emerald-300" fill="currentColor" viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z"/></svg>
    <span class="font-display text-lg font-semibold text-white">PlantCare</span>
  </a>
</header>

<main class="flex-1 flex items-center justify-center px-4 py-6 sm:px-6">
  <div class="w-full max-w-md">

    <div class="text-center mb-6">
      <p class="text-xs uppercase tracking-[0.25em] text-emerald-300/80">Welcome</p>
      <h1 class="font-display mt-2 text-4xl font-semibold text-white sm:text-5xl">Create your account.</h1>
      <p class="mt-3 text-sm text-emerald-100/70">Score your plants. Get personal care advice.</p>
    </div>

    <div class="glass-light rounded-3xl p-6 shadow-soft sm:p-8 leaf-bg">

      <form class="space-y-5">
        <div>
          <label class="block text-[11px] uppercase tracking-wider font-bold text-stone-600">Full name</label>
          <input type="text" placeholder="Dipanjan Deb" class="mt-2 w-full rounded-xl border-0 bg-stone-100 px-4 py-3 text-sm text-stone-900 placeholder:text-stone-400 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-[11px] uppercase tracking-wider font-bold text-stone-600">Email</label>
          <input type="email" placeholder="you@example.com" class="mt-2 w-full rounded-xl border-0 bg-stone-100 px-4 py-3 text-sm text-stone-900 placeholder:text-stone-400 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-[11px] uppercase tracking-wider font-bold text-stone-600">Phone <span class="text-stone-400 normal-case tracking-normal">· for care reminders later</span></label>
          <div class="mt-2 flex">
            <span class="inline-flex items-center rounded-l-xl bg-stone-200 px-3 text-sm font-semibold text-stone-700">+91</span>
            <input type="tel" placeholder="98765 43210" class="w-full rounded-r-xl border-0 bg-stone-100 px-4 py-3 text-sm text-stone-900 placeholder:text-stone-400 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
          </div>
        </div>

        <div>
          <label class="block text-[11px] uppercase tracking-wider font-bold text-stone-600">Password</label>
          <input type="password" placeholder="Min 6 chars, letters + numbers" class="mt-2 w-full rounded-xl border-0 bg-stone-100 px-4 py-3 text-sm text-stone-900 placeholder:text-stone-400 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none">
        </div>

        <label class="flex items-start gap-2.5 cursor-pointer">
          <input type="checkbox" class="mt-0.5 h-4 w-4 rounded border-stone-300 text-emerald-600 focus:ring-emerald-500" checked>
          <span class="text-xs text-stone-600">I agree to the <a class="text-emerald-700 font-semibold hover:underline">Terms</a> and <a class="text-emerald-700 font-semibold hover:underline">Privacy Policy</a>.</span>
        </label>

        <button type="submit" class="w-full rounded-2xl bg-emerald-900 px-6 py-3.5 text-sm font-bold text-emerald-300 shadow-soft hover:bg-emerald-800 transition">Create account</button>
      </form>

      <div class="mt-6 text-center text-xs text-stone-500">
        Already have an account? <a href="#" class="font-semibold text-emerald-700 hover:underline">Sign in</a>
      </div>

    </div>

    <p class="mt-6 text-center text-[11px] text-emerald-300/40 uppercase tracking-widest">You'll verify your email next.</p>

  </div>
</main>

</body>
</html>
